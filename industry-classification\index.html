<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>行业分类查询 — SHEEN Toolbox</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    :root {
      --black: #000000;
      --text-primary: #111827;
      --text-secondary: #6B7280;
      --bg-page: #F8FAFC;
      --bg-card: #FFFFFF;
      --border: #E5E7EB;
      --border-light: #F3F4F6;
      --brand-red: #7A1825;
      --brand-red-hover: #5C121C;
      --brand-red-light: #FEF2F2;
      --amber: #FBBF24;
      --radius-lg: 20px;
      --radius-xl: 28px;
      --radius-md: 12px;
      --radius-sm: 8px;
      --transition: 0.2s ease;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'PingFang SC', 'Microsoft YaHei', sans-serif;
      background: var(--bg-page);
      color: var(--text-primary);
      font-size: 14px;
      line-height: 1.6;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Navigation ── */
    .breadcrumb { padding: 12px 24px; font-size: 13px; color: var(--text-secondary); border-bottom: 1px solid var(--border); background: var(--bg-card); display: flex; align-items: center; gap: 6px; }
    .breadcrumb a { color: var(--brand-red); text-decoration: none; font-weight: 600; transition: opacity .2s; display: inline-flex; align-items: center; gap: 4px; }
    .breadcrumb a:hover { opacity: .7; text-decoration: underline; }
    .breadcrumb span { color: var(--text-secondary); }

    /* ── Layout ── */
    .app-wrapper { max-width: 1400px; margin: 0 auto; padding: 28px 24px; flex: 1; width: 100%; }
    .page-title { font-size:22px; font-weight: 700; color: var(--text-primary); margin-bottom: 6px; display: flex; align-items: center; gap: 10px; }
    .page-title i { color: var(--brand-red); font-size:22px; }
    .page-subtitle { font-size:11px; color: var(--text-secondary); margin-bottom: 20px; }

    .main-grid { display: grid; grid-template-columns: 340px 1fr; gap: 20px; }
    @media (max-width: 900px) {
      .main-grid { grid-template-columns: 1fr; }
      .app-wrapper { padding: 16px; }
      .sidebar { position: static; max-height: none; padding: 12px 16px; }
      .sidebar h3 { display: flex; align-items: center; justify-content: space-between; cursor: pointer; margin-bottom: 0; }
      .sidebar h3 .toggle-arrow { display: inline; font-size: 12px; transition: transform .25s; color: var(--text-secondary); }
      .sidebar.collapsed .sidebar-body { display: none; }
      .sidebar.collapsed h3 { margin-bottom: 0; }
      .sidebar.collapsed h3 .toggle-arrow { transform: rotate(-90deg); }
      .sidebar:not(.collapsed) h3 { margin-bottom: 14px; }
    }

    /* ── Sidebar ── */
    .sidebar { background: var(--bg-card); border-radius: var(--radius-lg); border: 1px solid var(--border); padding: 20px; position: sticky; top: 20px; max-height: calc(100vh - 160px); overflow-y: auto; }
    .sidebar h3 { font-size: 16px; font-weight: 600; margin-bottom: 14px; color: var(--text-primary); }
    .sidebar h3 .toggle-arrow { display: none; }
    .stat-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid var(--border-light); font-size:11px; }
    .stat-row:last-child { border-bottom: none; }
    .stat-row span:first-child { color: var(--text-secondary); }
    .stat-row span:last-child { font-weight: 600; color: var(--brand-red); }

    .search-box { position: relative; margin-bottom: 16px; }
    .search-box input { width: 100%; padding: 10px 14px 10px 38px; border: 1.5px solid var(--border); border-radius: 60px; font-size: 14px; background: var(--bg-card); color: var(--text-primary); font-family: inherit; transition: var(--transition); }
    .search-box input:focus { outline: none; border-color: var(--brand-red); box-shadow: 0 0 0 4px rgba(122,24,37,0.08); }
    .search-box i { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: var(--text-secondary); font-size: 14px; }

    .quick-filters { display: flex; flex-wrap: wrap; gap:4px; margin-bottom: 14px; }
    .quick-filter { font-size: 12px; padding: 4px 12px; border-radius: 60px; background: var(--border-light); color: var(--text-secondary); cursor: pointer; border: none; font-family: inherit; transition: var(--transition); }
    .quick-filter:hover { background: var(--brand-red-light); color: var(--brand-red); }
    .quick-filter.active { background: var(--brand-red); color: #fff; }

    /* ── Tree ── */
    .tree-container { background: var(--bg-card); border-radius: var(--radius-lg); border: 1px solid var(--border); padding: 20px 24px; }
    .tree-node { user-select: none; }
    .tree-row { display: flex; align-items: center; padding: 6px 8px; border-radius: var(--radius-sm); cursor: pointer; transition: background .15s; gap:4px; }
    .tree-row:hover { background: var(--bg-page); }
    .tree-row.selected { background: var(--brand-red-light); }
    .tree-toggle { width: 18px; height: 18px; display: flex; align-items: center; justify-content: center; flex: none; font-size: 10px; color: var(--text-secondary); transition: transform .2s; }
    .tree-toggle.expanded { transform: rotate(90deg); }
    .tree-toggle.leaf { visibility: hidden; }
    .tree-code { font-size: 12px; font-weight: 600; color: var(--brand-red); min-width: 36px; padding: 2px 6px; background: var(--brand-red-light); border-radius: 4px; text-align: center; flex: none; }
    .tree-code.lv1 { min-width: 24px; }
    .tree-name { font-size:11px; color: var(--text-primary); flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .tree-name.lv1 { font-weight: 600; font-size: 14px; }
    .tree-name.lv2 { font-weight: 500; }
    .tree-desc { font-size: 11px; color: var(--text-secondary); max-width: 200px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; display: none; }
    @media (min-width: 1100px) { .tree-desc { display: block; } }
    .tree-children { margin-left: 20px; border-left: 1px solid var(--border-light); padding-left: 8px; display: none; }
    .tree-children.open { display: block; }
    .tree-empty { text-align: center; padding: 40px 20px; color: var(--text-secondary); }
    .tree-empty i { font-size: 40px; color: var(--border); display: block; margin-bottom: 12px; }

    /* ── Detail Panel ── */
    .detail-panel { background: var(--bg-card); border-radius: var(--radius-lg); border: 1px solid var(--border); padding: 24px; margin-top: 16px; display: none; }
    .detail-panel.show { display: block; }
    .result-heading { font-size: 20px; font-weight: 700; color: var(--text-primary); margin-bottom: 14px; padding-bottom: 10px; border-bottom: 2px solid var(--brand-red); }
    .detail-header { display: flex; align-items: flex-start; gap: 14px; margin-bottom: 16px; }
    .detail-code { font-size:22px; font-weight: 700; color: var(--brand-red); padding:5px 10px; background: var(--brand-red-light); border-radius: var(--radius-sm); white-space: nowrap; }
    .detail-name { font-size:15px; font-weight: 600; color: var(--text-primary); flex: 1; }
    .detail-category { font-size: 12px; color: var(--text-secondary); margin-top: 4px; }
    .breadcrumb { display: flex; flex-wrap: wrap; gap: 4px; font-size: 12px; color: var(--text-secondary); margin-bottom: 12px; align-items: center; }
    .breadcrumb span { cursor: pointer; color: var(--brand-red); }
    .breadcrumb span:hover { text-decoration: underline; }
    .breadcrumb i { font-size: 8px; }
    .detail-desc { background: var(--bg-page); border-radius: var(--radius-sm); padding: 12px 16px; font-size:11px; color: var(--text-primary); line-height: 1.7; margin-bottom: 14px; }
    .detail-desc:empty { display: none; }
    .detail-list { margin-top: 12px; padding: 16px 20px; background: var(--bg-page); border-radius: var(--radius-md); border: 1px solid var(--border-light); }
    .detail-list .detail-item { font-size:11px; color: var(--text-primary); padding: 3px 0; line-height: 1.7; }
    .detail-list .detail-item.anno-title { color: var(--text-secondary); font-weight: 600; padding-bottom: 6px; border-bottom: 1px solid var(--border-light); margin-bottom: 4px; }
    .detail-actions { display: flex; gap: 8px; flex-wrap: wrap; }
    .btn-sm { padding: 8px 18px; border-radius: 60px; font-size:11px; font-weight: 500; cursor: pointer; border: none; font-family: inherit; transition: var(--transition); display: flex; align-items: center; gap:4px; }
    .btn-sm.btn-primary { background: var(--brand-red); color: #fff; }
    .btn-sm.btn-primary:hover { background: var(--brand-red-hover); }
    .btn-sm.btn-outline { background: var(--bg-card); color: var(--brand-red); border: 1.5px solid var(--brand-red); }
    .btn-sm.btn-outline:hover { background: var(--brand-red-light); }

    /* ── Results count ── */
    .result-info { font-size:11px; color: var(--text-secondary); padding: 8px 0; }
    .result-info strong { color: var(--brand-red); }

    /* ── Footer ── */
    .sheen-footer { text-align: center; padding: 16px 32px; font-size:11px; color: var(--text-secondary); border-top: 1px solid var(--border); background: var(--bg-card); letter-spacing: 0.5px; margin-top: auto; }
    .sheen-footer i { color: var(--amber); }
    .sheen-footer strong { color: var(--text-primary); }

    /* ── Print ── */
    .print-time { display: none; }
    
@media print {
      @page { size: A4; margin: 18mm 15mm 20mm 15mm;
        @bottom-center { content: "SHEEN Toolbox · 行业分类查询"; font-size: 8pt; color: #666; }
      }
      body { background: #fff !important; padding: 0 !important; font-size: 12pt; color: #000 !important; }
      .breadcrumb, .sheen-footer, .sidebar, .btn-sm, .page-title, .page-subtitle, .tree-container, .detail-actions { display: none !important; }
      .print-time { display: block !important; font-size: 9pt; color: #666; text-align: right; margin-bottom: 12px; }
      .detail-panel { display: block !important; box-shadow: none !important; border: 1.5px solid #333 !important; margin-top: 0 !important; }
      .breadcrumb { font-size: 10pt !important; color: #555 !important; }
      .breadcrumb span { color: #555 !important; }
      .result-heading { font-size: 20pt; color: #000 !important; border-bottom-color: #333 !important; }
      .detail-code { font-size: 18pt; color: #000 !important; background: #f5f5f5 !important; }
      .detail-list { background: none !important; border: none !important; padding: 8px 0 !important; }
      .detail-list .detail-item { font-size: 10pt; color: #333 !important; }
      .detail-list .anno-title { color: #555 !important; }
      .detail-desc { background: none !important; border: 1px solid #e0e0e0 !important; }
      .main-grid { grid-template-columns: 1fr !important; }
      .app-wrapper { padding: 0 !important; }
    }
  </style>
</head>
<body>

<div class="breadcrumb">
    <a href="/sheen-toolbox/"><i class="fa-solid fa-arrow-left"></i> 返回首页</a>
    <span> / 行业分类查询 (GB/T 4754)</span>

<main class="app-wrapper">
  <div class="page-title">

  </div>

  <div class="main-grid">
    <!-- Sidebar -->
    <aside class="sidebar no-print collapsed">

      <div class="sidebar-body">

    <!-- Main Content -->

  <i class="fa-solid fa-shield-halved" style="color:var(--amber);font-size:24px"></i> &nbsp;<strong>SHEEN Toolbox</strong> · 行业分类查询
</footer>

document.getElementById('printTime').textContent = new Date(Date.now()+(480+new Date().getTimezoneOffset())*60000).toISOString().replace('T',' ').slice(0,16);

<script>
(function() {
'use strict';

// ── Load Data (async from external JSON — fast page load + browser caching) ──
var allData = [];
var treeContainer = document.getElementById('treeContainer');
treeContainer.innerHTML = '<div class="tree-empty"><i class="fa-solid fa-spinner fa-spin"></i> 加载行业分类数据...</div>';

function startApp(data){
allData = data;

// Build lookup maps
var byCode = {};
var rootCategories = [];
allData.forEach(function(item) {
  byCode[item.code] = item;
  if (item.level === 1) rootCategories.push(item);
});
rootCategories.sort(function(a,b) { return a.code.localeCompare(b.code); });

// Update stats
var counts = {1:0, 2:0, 3:0, 4:0};
allData.forEach(function(item) { counts[item.level]++; });
document.getElementById('statSmall').textContent = counts[4];

// ── Build quick filters ──
var qfContainer = document.getElementById('quickFilters');
rootCategories.forEach(function(cat) {
  var btn = document.createElement('button');
  btn.className = 'quick-filter';
  btn.textContent = cat.code;
  btn.title = cat.name;
  btn.addEventListener('click', function() {
    document.querySelectorAll('.quick-filter').forEach(function(b) { b.classList.remove('active'); });
    btn.classList.add('active');
    filterByCategory(cat.code);
  });
  qfContainer.appendChild(btn);
});

// ── Render Tree ──
var treeContainer = document.getElementById('treeContainer');
var selectedCode = null;

function getChildren(parentCode) {
  return allData.filter(function(item) { return item.parentCode === parentCode; })
    .sort(function(a,b) { return a.code.localeCompare(b.code); });
}

function renderTreeNode(item) {
  var children = getChildren(item.code);
  var hasChildren = children.length > 0;
  var isLeaf = !hasChildren;
  var indent = item.level || 1;

  var div = document.createElement('div');
  div.className = 'tree-node';

  var row = document.createElement('div');
  row.className = 'tree-row';
  row.setAttribute('data-code', item.code);
  row.setAttribute('data-level', item.level);

  var toggle = document.createElement('span');
  toggle.className = 'tree-toggle';
  if (isLeaf) toggle.classList.add('leaf');
  else toggle.innerHTML = '<i class="fa-solid fa-chevron-right"></i>';

  var codeSpan = document.createElement('span');
  codeSpan.className = 'tree-code';
  if (item.level === 1) codeSpan.classList.add('lv1');
  codeSpan.textContent = item.code;

  var nameSpan = document.createElement('span');
  nameSpan.className = 'tree-name';
  if (item.level === 1) nameSpan.classList.add('lv1');
  if (item.level === 2) nameSpan.classList.add('lv2');
  nameSpan.textContent = item.name;

  var descSpan = document.createElement('span');
  descSpan.className = 'tree-desc';
  if (item.desc) descSpan.textContent = item.desc.substring(0, 40);

  row.appendChild(toggle);
  row.appendChild(codeSpan);
  row.appendChild(nameSpan);
  row.appendChild(descSpan);
  div.appendChild(row);

  var childContainer = document.createElement('div');
  childContainer.className = 'tree-children';

  if (hasChildren && item.level < 4) {
    children.forEach(function(child) {
      childContainer.appendChild(renderTreeNode(child));
    });
  }
  div.appendChild(childContainer);

  // Click toggle
  if (!isLeaf) {
    toggle.addEventListener('click', function(e) {
      e.stopPropagation();
      toggle.classList.toggle('expanded');
      childContainer.classList.toggle('open');
    });
  }

  // Click row -> select
  row.addEventListener('click', function() {
    selectItem(item);
  });

  return div;
}

function renderTree(filteredData) {
  treeContainer.innerHTML = '';
  if (!filteredData || filteredData.length === 0) {
    // Render full tree
    rootCategories.forEach(function(cat) {
      treeContainer.appendChild(renderTreeNode(cat));
    });
    document.getElementById('resultInfo').textContent = '';
  } else {
    // Render filtered results
    if (filteredData.length === 0) {
      treeContainer.innerHTML = '<div class="tree-empty"><i class="fa-solid fa-circle-exclamation"></i>未找到匹配结果</div>';
      document.getElementById('resultInfo').textContent = '未找到匹配结果';
    } else {
      // Show results flat
      document.getElementById('resultInfo').innerHTML = '找到 <strong>' + filteredData.length + '</strong> 条结果';
      filteredData.forEach(function(item) {
        var row = document.createElement('div');
        row.className = 'tree-row';
        row.setAttribute('data-code', item.code);

        var toggle = document.createElement('span');
        toggle.className = 'tree-toggle leaf';
        row.appendChild(toggle);

        var codeSpan = document.createElement('span');
        codeSpan.className = 'tree-code';
        codeSpan.textContent = item.code;
        row.appendChild(codeSpan);

        var nameSpan = document.createElement('span');
        nameSpan.className = 'tree-name';
        var prefix = item.category ? '[' + item.category + '] ' : '';
        nameSpan.textContent = prefix + item.name;
        row.appendChild(nameSpan);

        var descSpan = document.createElement('span');
        descSpan.className = 'tree-desc';
        if (item.desc) descSpan.textContent = item.desc.substring(0, 50);
        row.appendChild(descSpan);

        row.addEventListener('click', function() { selectItem(item); });
        treeContainer.appendChild(row);
      });
    }
  }
}

// ── Select & Detail Panel ──
function selectItem(item) {
  selectedCode = item.code;

  // Highlight
  document.querySelectorAll('.tree-row').forEach(function(r) { r.classList.remove('selected'); });
  var row = document.querySelector('[data-code="' + item.code + '"]');
  if (row) row.classList.add('selected');

  // Build breadcrumb
  var breadcrumb = document.getElementById('breadcrumb');
  var path = [];
  var current = item;
  while (current.parentCode) {
    path.unshift(current);
    current = byCode[current.parentCode];
  }
  path.unshift(current);

  breadcrumb.innerHTML = path.map(function(p, i) {
    var sep = i > 0 ? ' <i class="fa-solid fa-chevron-right"></i> ' : '';
    return sep + '<span onclick="jumpTo(\'' + p.code + '\')">' + p.name + '</span>';
  }).join('');

  // Show detail
  var panel = document.getElementById('detailPanel');
  panel.classList.add('show');
  document.getElementById('detailCode').textContent = item.code;
  document.getElementById('detailName').textContent = item.name;
  document.getElementById('detailCategory').textContent = item.category ? '门类 ' + item.category + ': ' + (byCode[item.category] ? byCode[item.category].name : '') : '';
  document.getElementById('detailDesc').textContent = item.desc || '（无详细说明）';
  // Show annotation details if available
  var dl = document.getElementById('detailList');
  if (item.details && item.details.length > 0) {
    dl.innerHTML = item.details.map(function(d) { 
      var cls = d.indexOf('◇ ') === 0 ? 'detail-item anno-title' : 'detail-item';
      return '<div class="' + cls + '">' + d + '</div>'; 
    }).join('');
    dl.style.display = 'block';
  } else {
    dl.innerHTML = '';
    dl.style.display = 'none';
  }
  panel.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

// ── Search ──
var searchTimer;
document.getElementById('searchInput').addEventListener('input', function() {
  clearTimeout(searchTimer);
  var val = this.value.trim();
  if (!val) {
    renderTree();
    document.getElementById('detailPanel').classList.remove('show');
    return;
  }
  searchTimer = setTimeout(function() { doSearch(val); }, 250);
});

function doSearch(query) {
  var q = query.toLowerCase();
  var results = allData.filter(function(item) {
    return item.code.toLowerCase().indexOf(q) >= 0 ||
           item.name.toLowerCase().indexOf(q) >= 0 ||
           (item.desc && item.desc.toLowerCase().indexOf(q) >= 0);
  });
  // Sort by level (most specific first)
  results.sort(function(a,b) { return b.level - a.level || a.code.localeCompare(b.code); });
  // Limit to 200 results for performance
  if (results.length > 200) results = results.slice(0, 200);
  renderTree(results);
  if (results.length > 0) selectItem(results[0]);
}

function filterByCategory(catCode) {
  document.getElementById('searchInput').value = '';
  var results = allData.filter(function(item) { return item.category === catCode; });
  results.sort(function(a,b) { return a.level - b.level || a.code.localeCompare(b.code); });
  renderTree(results);
  if (results.length > 0) selectItem(results[0]);
}

// ── Copy ──
window.copyCode = function() {
  if (!selectedCode) return;
  navigator.clipboard.writeText(selectedCode).then(function() {
    showToast('代码 ' + selectedCode + ' 已复制');
  });
};

window.copyFull = function() {
  if (!selectedCode) return;
  var item = byCode[selectedCode];
  var text = item.code + ' ' + item.name;
  navigator.clipboard.writeText(text).then(function() {
    showToast('已复制: ' + text);
  });
};

window.jumpTo = function(code) {
  var item = byCode[code];
  if (item) {
    selectItem(item);
    // Expand tree to show the item if in tree mode
    var row = document.querySelector('[data-code="' + code + '"]');
    if (row) {
      row.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }
    // Expand parent nodes
    var current = item;
    while (current.parentCode) {
      var parentRow = document.querySelector('[data-code="' + current.parentCode + '"]');
      if (parentRow) {
        var parentToggle = parentRow.querySelector('.tree-toggle');
        var parentChildren = parentRow.parentElement.querySelector('.tree-children');
        if (parentToggle && !parentToggle.classList.contains('expanded')) {
          parentToggle.classList.add('expanded');
        }
        if (parentChildren && !parentChildren.classList.contains('open')) {
          parentChildren.classList.add('open');
        }
      }
      current = byCode[current.parentCode];
    }
  }
};

function showToast(msg) {
  var toast = document.createElement('div');
  toast.textContent = msg;
  toast.style.cssText = 'position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#111827;color:#fff;padding:10px 24px;border-radius:60px;font-size:13px;z-index:9999;animation:fadeInOut 2s forwards;';
  document.body.appendChild(toast);
  setTimeout(function() { toast.remove(); }, 2100);
}

// Add toast animation
var style = document.createElement('style');
style.textContent = '@keyframes fadeInOut{0%{opacity:0;transform:translateX(-50%) translateY(10px)}15%{opacity:1;transform:translateX(-50%) translateY(0)}85%{opacity:1}100%{opacity:0}}';
document.head.appendChild(style);

// ── Init ──
  renderTree();
}

// Kick off async data load
fetch('gb4754_data.json')
  .then(function(r){return r.json()})
  .then(function(data){startApp(data)})
  .catch(function(e){treeContainer.innerHTML='<div class="tree-empty" style="color:#DC2626"><i class="fa-solid fa-triangle-exclamation"></i> 数据加载失败：'+e.message+'</div>'});
})();
</script>
