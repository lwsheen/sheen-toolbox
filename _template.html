<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="工具描述 — SHEEN Toolbox">
    <title>工具名称 — SHEEN Toolbox</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="/sheen-toolbox/common.css">
    <style>
        /* 仅放本工具特有样式，公共样式已在 common.css */
        /* 可用类: .btn-primary .btn-print .btn-outline .btn-danger .btn-sm */
        /* 可用类: .card .form-card .result-value .result-card .data-table */
        /* 可用类: .form-control .page-title .page-subtitle .badge */
        /* 可用类: .flex-row .flex-between .mt-16 .mb-16 .text-center */
        /* CSS变量: var(--brand-red) var(--text-primary) var(--border) 等 */
    </style>
</head>
<body>

    <!-- 面包屑导航 -->
    <div class="breadcrumb">
        <a href="/sheen-toolbox/"><i class="fa-solid fa-arrow-left"></i> 返回首页</a>
        <span> / 工具名称</span>
    </div>

    <!-- 主内容区域 -->
    <!-- 查询类工具用 max-width:1200px，计算器类用 800px，工作流类用 900px -->
    <!-- ===== 主容器 ===== -->
    <!-- 宽度分三档：工具类用 container-calc(800px) | container-wf(900px) | container-query(1200px) -->
    <main class="app-container container-calc">

        <!-- 页面标题 -->
        <h1 class="page-title">工具名称</h1>
        <p class="page-subtitle" style="margin-bottom:20px;">工具简要说明，依据标准等</p>

        <!-- 表单卡片 -->
        <div class="form-card">
            <h3>参数输入</h3>
            <!-- 表单内容 -->
        </div>

        <!-- 结果展示 -->
        <div class="result-card" style="display:none;">
            <div class="number">0</div>
            <div class="label">结果说明</div>
        </div>

    </main>

    <!-- 页脚 -->
    <footer class="sheen-footer">
        <i class="fa-solid fa-shield-halved"></i> &nbsp;<strong>SHEEN Toolbox</strong> · 工具名称
    </footer>

    <!-- 打印时间戳 -->
    <div class="print-time" id="printTime"></div>

    <script>
    (function() {
        'use strict';
        // 打印时间
        document.getElementById('printTime').textContent =
            new Date().toISOString().replace('T', ' ').slice(0, 16);

        // 业务逻辑
    })();
    </script>

</body>
</html>
