<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="工具描述 — SHEEN Toolbox">
    <title>工具名称 — SHEEN Toolbox</title>

    <!-- 资源加载 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="/sheen-toolbox/common.css">

    <style>
        /* ============================================
           仅放本工具特有样式，公共样式已在 common.css
           请勿在此处重新定义以下类：
             .breadcrumb / .sheen-footer / .sheen-footer i / .sheen-footer strong
             .btn-primary / .btn-print / .btn-outline / .btn-danger / .btn-sm
             .card / .form-card / .result-card / .result-value
             .form-control / .form-control:focus
             .page-title / .page-subtitle / .badge / .source-badge
             .data-table / .table-scroll / .ref-table
             .print-time
             @media print（打印样式 common.css 已提供）
             :root 变量（--brand-red 等 common.css 已定义）
           ============================================ */
    </style>
</head>
<body>

    <!-- 面包屑导航 -->
    <div class="breadcrumb">
        <a href="/sheen-toolbox/"><i class="fa-solid fa-arrow-left"></i> 返回首页</a>
        <span> / 工具名称</span>
    </div>

    <!-- 主内容区域 -->
    <!-- 容器宽度三档：container-calc(800px) | container-wf(900px) | container-query(1200px) -->
    <main class="app-container container-calc">

        <h1 class="page-title">工具名称</h1>
        <p class="page-subtitle" style="margin-bottom:20px;">工具简要说明，依据标准等</p>

        <!-- 表单卡片 -->
        <div class="form-card">
            <h3>参数输入</h3>
            <!-- 使用 common.css 提供的表单控件：
                 <input class="form-control">
                 <select class="form-control">
                 <button class="btn-primary">
                 <button class="btn-print">
                 <button class="btn-outline">
                 <button class="btn-sm"> -->
        </div>

        <!-- 结果展示 -->
        <div class="result-card" style="display:none;">
            <div class="number">0</div>
            <div class="label">结果说明</div>
        </div>

    </main>

    <!-- 页脚（公共样式 .sheen-footer 来自 common.css，勿重新定义） -->
    <footer class="sheen-footer">
        <i class="fa-solid fa-shield-halved"></i> &nbsp;<strong>SHEEN Toolbox</strong> · 工具名称
    </footer>

    <!-- 打印时间戳 -->
    <div class="print-time" id="printTime"></div>

    <script>
    (function() {
        'use strict';
        // 打印时间
        document.getElementById('printTime').textContent =
            new Date().toISOString().replace('T', ' ').slice(0, 16);

        // ===== 业务逻辑 =====
    })();
    </script>

</body>
</html>
