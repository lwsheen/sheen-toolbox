<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>危险货物查询 — SHEEN Toolbox</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    :root {
      --black: #000000;
      --text-primary: #111827;
      --text-secondary: #6B7280;
      --bg-page: #F8FAFC;
      --bg-card: #FFFFFF;
      --border: #E5E7EB;
      --border-light: #F3F4F6;
      --brand-red: #7A1825;
      --brand-red-hover: #5C121C;
      --brand-red-light: #FEF2F2;
      --amber: #FBBF24;
      --radius-lg: 20px;
      --radius-xl: 28px;
      --radius-md: 12px;
      --radius-sm: 8px;
      --transition: 0.2s ease;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'PingFang SC', 'Microsoft YaHei', sans-serif;
      background: var(--bg-page);
      color: var(--text-primary);
      font-size: 14px;
      line-height: 1.6;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Navigation ── */
    .sheen-nav { background: var(--black); padding: 0 32px; display: flex; align-items: center; justify-content: space-between; border-bottom: 4px solid var(--brand-red); flex-wrap: wrap; min-height: 56px; }
    .sheen-nav-brand { display: flex; align-items: center; gap: 10px; color: #fff; text-decoration: none; padding: 14px 0; }
    .sheen-nav-brand i { font-size: 24px; color: var(--amber); }
    .sheen-nav-brand-text { font-size: 18px; font-weight: 700; letter-spacing: 0.5px; }
    .sheen-nav-tools { display: flex; gap: 4px; flex-wrap: wrap; }
    .sheen-nav-tool { display: flex; align-items: center; gap: 6px; padding: 8px 16px; color: rgba(255,255,255,0.7); text-decoration: none; font-size: 13px; font-weight: 500; border-radius: 60px; transition: all .2s ease; white-space: nowrap; }
    .sheen-nav-tool:hover { background: rgba(255,255,255,0.1); color: #fff; }
    .sheen-nav-tool.active { background: rgba(255,255,255,0.15); color: #fff; font-weight: 600; }

    /* ── Layout ── */
    .app-wrapper { max-width: 1400px; margin: 0 auto; padding: 28px 24px; flex: 1; width: 100%; }
    .page-title { font-size: 24px; font-weight: 700; color: var(--text-primary); margin-bottom: 4px; display: flex; align-items: center; gap: 10px; }
    .page-title i { color: var(--brand-red); font-size: 22px; }
    .page-subtitle { font-size: 13px; color: var(--text-secondary); margin-bottom: 20px; }

    .main-grid { display: grid; grid-template-columns: 360px 1fr; gap: 20px; }

    /* ── Sidebar ── */
    .sidebar { background: var(--bg-card); border-radius: var(--radius-lg); border: 1px solid var(--border); padding: 20px; position: sticky; top: 20px; max-height: calc(100vh - 160px); overflow-y: auto; }
    .sidebar h3 { font-size: 16px; font-weight: 600; margin-bottom: 14px; color: var(--text-primary); display: flex; align-items: center; gap: 8px; }
    .sidebar h3 i { color: var(--brand-red); }

    .search-box { position: relative; margin-bottom: 16px; }
    .search-box input { width: 100%; padding: 10px 14px 10px 38px; border: 1.5px solid var(--border); border-radius: 60px; font-size: 14px; background: var(--bg-card); color: var(--text-primary); font-family: inherit; transition: var(--transition); }
    .search-box input:focus { outline: none; border-color: var(--brand-red); box-shadow: 0 0 0 4px rgba(122,24,37,0.08); }
    .search-box i { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: var(--text-secondary); font-size: 14px; }

    .class-filter { margin-bottom: 16px; }
    .class-filter h4 { font-size: 12px; font-weight: 700; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 8px; }
    .class-chips { display: flex; flex-wrap: wrap; gap: 6px; }
    .class-chip { font-size: 12px; padding: 5px 12px; border-radius: 60px; background: var(--border-light); color: var(--text-secondary); cursor: pointer; border: none; font-family: inherit; transition: var(--transition); white-space: nowrap; }
    .class-chip:hover { background: var(--brand-red-light); color: var(--brand-red); }
    .class-chip.active { background: var(--brand-red); color: #fff; font-weight: 600; }
    .sub-class { margin-top: 8px; display: flex; flex-wrap: wrap; gap: 4px; }
    .sub-chip { font-size: 11px; padding: 3px 10px; border-radius: 60px; background: var(--bg-page); color: var(--text-secondary); cursor: pointer; border: 1px solid var(--border); font-family: inherit; transition: var(--transition); }
    .sub-chip:hover { border-color: var(--brand-red); color: var(--brand-red); }
    .sub-chip.active { background: var(--brand-red-light); color: var(--brand-red); border-color: var(--brand-red); font-weight: 600; }

    .stats-bar { border-top: 1px solid var(--border-light); padding-top: 12px; }
    .stat-row { display: flex; justify-content: space-between; padding: 6px 0; font-size: 13px; }
    .stat-row span:first-child { color: var(--text-secondary); }
    .stat-row span:last-child { font-weight: 600; color: var(--brand-red); }

    /* ── Main Content ── */
    .content-area { display: flex; flex-direction: column; gap: 16px; }
    .result-header { display: flex; justify-content: space-between; align-items: center; }
    .result-count { font-size: 13px; color: var(--text-secondary); }
    .result-count strong { color: var(--text-primary); }

    /* Table */
    .table-wrap { background: var(--bg-card); border-radius: var(--radius-lg); border: 1px solid var(--border); overflow: hidden; }
    .dg-table { width: 100%; border-collapse: collapse; }
    .dg-table th { background: var(--bg-page); padding: 10px 12px; font-size: 12px; font-weight: 700; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.5px; text-align: left; border-bottom: 2px solid var(--border-light); white-space: nowrap; }
    .dg-table td { padding: 9px 12px; font-size: 13px; border-bottom: 1px solid var(--border-light); color: var(--text-primary); }
    .dg-table tbody tr { cursor: pointer; transition: background .15s; }
    .dg-table tbody tr:hover { background: var(--brand-red-light); }
    .dg-table tbody tr.selected { background: var(--brand-red-light); outline: 2px solid var(--brand-red); outline-offset: -2px; }
    .badge-cls { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 700; white-space: nowrap; }
    .badge-cls.c1 { background: #FF9800; color: #fff; }
    .badge-cls.c2 { background: #4CAF50; color: #fff; }
    .badge-cls.c3 { background: #F44336; color: #fff; }
    .badge-cls.c4 { background: #2196F3; color: #fff; }
    .badge-cls.c41 { background: #2196F3; color: #fff; }
    .badge-cls.c42 { background: #FFC107; color: #333; }
    .badge-cls.c43 { background: #1565C0; color: #fff; }
    .badge-cls.c51 { background: #FFEB3B; color: #333; }
    .badge-cls.c52 { background: #FF9800; color: #fff; }
    .badge-cls.c6 { background: #fff; color: #000; border: 2px solid #000; }
    .badge-cls.c61 { background: #fff; color: #333; border: 2px solid #000; }
    .badge-cls.c7 { background: #FFEB3B; color: #000; }
    .badge-cls.c8 { background: #fff; color: #000; border: 2px solid #000; }
    .badge-cls.c9 { background: #fff; color: #000; border: 2px solid #000; }
    .pg-badge { display: inline-block; padding: 1px 6px; border-radius: 3px; font-size: 11px; font-weight: 600; background: var(--border-light); color: var(--text-secondary); margin-left: 4px; }

    /* Detail Panel */
    .detail-panel { background: var(--bg-card); border-radius: var(--radius-lg); border: 1px solid var(--border); padding: 24px; display: none; }
    .detail-panel.active { display: block; }
    .detail-empty { text-align: center; padding: 40px; color: var(--text-secondary); }
    .detail-empty i { font-size: 48px; color: var(--border); display: block; margin-bottom: 12px; }
    .detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .detail-field { }
    .detail-field label { display: block; font-size: 11px; font-weight: 700; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; }
    .detail-field .value { font-size: 15px; font-weight: 600; color: var(--text-primary); }
    .detail-field .value.un { font-size: 24px; color: var(--brand-red); }
    .detail-note { margin-top: 16px; padding-top: 16px; border-top: 1px solid var(--border-light); font-size: 13px; color: var(--text-secondary); line-height: 1.7; }
    .detail-actions { margin-top: 16px; display: flex; gap: 8px; }
    .btn-primary { background: var(--brand-red); color: #fff; border: none; padding: 10px 24px; border-radius: 60px; font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.25s; display: inline-flex; align-items: center; gap: 6px; font-family: inherit; }
    .btn-primary:hover { background: var(--brand-red-hover); transform: translateY(-2px); box-shadow: 0 8px 20px rgba(122,24,37,0.25); }
    .btn-print { background: var(--bg-card); color: var(--brand-red); border: 1.5px solid var(--brand-red); padding: 10px 24px; border-radius: 60px; font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.25s; display: inline-flex; align-items: center; gap: 6px; font-family: inherit; }
    .btn-print:hover { background: var(--brand-red-light); transform: translateY(-2px); box-shadow: 0 8px 20px rgba(122,24,37,0.15); }

    /* Class info card */
    .class-info { background: var(--brand-red-light); border-radius: var(--radius-md); padding: 16px; margin-bottom: 16px; border-left: 4px solid var(--brand-red); }
    .class-info h4 { font-size: 15px; font-weight: 700; color: var(--brand-red); margin-bottom: 4px; }
    .class-info p { font-size: 13px; color: var(--text-secondary); margin: 0; }
    .class-info .pg-info { margin-top: 8px; font-size: 12px; color: var(--text-secondary); }

    /* ── Footer ── */
    .sheen-footer { text-align: center; padding: 16px 32px; font-size: 13px; color: var(--text-secondary); border-top: 1px solid var(--border); background: var(--bg-card); letter-spacing: 0.5px; }
    .sheen-footer i { color: var(--amber); }
    .sheen-footer strong { color: var(--text-primary); }

    /* Print */
    .print-time { display: none; }

    @media print {
      @page { size: A4; margin: 18mm 15mm 20mm 15mm;
        @bottom-center { content: "SHEEN Toolbox · 危险货物查询"; font-size: 8pt; color: #666; }
      }
      body { background: #fff !important; padding: 0 !important; font-size: 12pt; color: #000 !important; }
      .sheen-nav, .sheen-footer, .btn-primary, .btn-print, .sidebar, .table-wrap, .class-info, .result-header, .detail-actions { display: none !important; }
      .print-time { display: block !important; font-size: 9pt; color: #666; text-align: right; margin-bottom: 12px; }
      .detail-panel { box-shadow: none !important; border-radius: 0 !important; border: 1.5px solid #333 !important; display: block !important; }
      .detail-panel .detail-field .value.un { color: #000 !important; }
      .detail-empty { display: none !important; }
    }

    /* Mobile */
    @media (max-width: 900px) {
      .main-grid { grid-template-columns: 1fr; }
      .sheen-nav { padding: 0 16px; }
      .app-wrapper { padding: 16px; }
      .sidebar { position: static; max-height: none; }
      .detail-grid { grid-template-columns: 1fr; }
      .dg-table th:nth-child(3), .dg-table td:nth-child(3) { display: none; }
    }
    @media (max-width: 480px) {
      .dg-table th:nth-child(2), .dg-table td:nth-child(2) { display: none; }
      .dg-table th:nth-child(5), .dg-table td:nth-child(5) { display: none; }
    }
  </style>
</head>

        </div>
      </div>
    </div>

      }

      // Build class chips
      function buildClassChips() {
        var html = '<button class="class-chip active" data-cls="">全部类别</button>';
        for (var i = 0; i < classes.length; i++) {
          html += '<button class="class-chip" data-cls="' + classes[i].id + '">' + classes[i].id + ' ' + classes[i].name.split('；')[0].slice(0,8) + '</button>';
        }
        document.getElementById('classChips').innerHTML = html;
      }

      function buildSubChips(clsId) {
        var container = document.getElementById('subChips');
        if (!clsId) { container.innerHTML = ''; return; }
        for (var i = 0; i < classes.length; i++) {
          if (classes[i].id === clsId && classes[i].sub && classes[i].sub.length > 0) {
            var html = '';
            for (var j = 0; j < classes[i].sub.length; j++) {
              html += '<button class="sub-chip" data-sub="' + classes[i].sub[j].id + '">' + classes[i].sub[j].id + ' ' + classes[i].sub[j].name.slice(0,12) + '</button>';
            }
            container.innerHTML = html;
            return;
          }
        }
        container.innerHTML = '';
      }

      function filterItems() {
        return items.filter(function(item) {
          if (currentClass && getClassId(item.cls) !== currentClass) return false;
          if (currentSubclass && item.cls.trim() !== currentSubclass) return false;
          if (currentSearch) {
            var q = currentSearch.toLowerCase();
            return item.un.indexOf(q) !== -1 || item.name.toLowerCase().indexOf(q) !== -1;
          }
          return true;
        });
      }

      function renderTable() {
        var filtered = filterItems();
        var tbody = document.getElementById('tableBody');
        var html = '';
        for (var i = 0; i < filtered.length; i++) {
          var item = filtered[i];
          var clsClass = getBadgeClass(item.cls);
          var selClass = (selectedItem && selectedItem.un === item.un) ? ' selected' : '';
          html += '<tr class="' + selClass + '" data-un="' + item.un + '">';
          html += '<td><strong style="color:var(--brand-red)">' + item.un + '</strong></td>';
          html += '<td><span class="badge-cls ' + clsClass + '">' + item.cls + '</span></td>';
          html += '<td>' + (item.pg ? '<span class="pg-badge">' + item.pg + '</span>' : '—') + '</td>';
          html += '<td style="max-width:280px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">' + item.name + '</td>';
          html += '<td>' + (item.sub || '—') + '</td>';
          html += '</tr>';
        }
        tbody.innerHTML = html;
        document.getElementById('resultCount').innerHTML = '显示 <strong>' + filtered.length + '</strong> 条结果';
      }

      function showDetail(item) {
        selectedItem = item;
        var panel = document.getElementById('detailPanel');
        var empty = document.getElementById('detailEmpty');
        var content = document.getElementById('detailContent');
        var grid = document.getElementById('detailGrid');
        var note = document.getElementById('detailNote');

        panel.classList.add('active');
        empty.style.display = 'none';
        content.style.display = 'block';

        var fields = [
          ['UN 编号', '<span class="value un">' + item.un + '</span>'],
          ['中文品名', item.name],
          ['英文名称', item.en || '（无）'],
          ['危险类别/项别', '<span class="badge-cls ' + getBadgeClass(item.cls) + '">' + item.cls + '</span> ' + getClassName(item.cls)],
          ['副危险性', item.sub || '无'],
          ['包装类别', item.pg || '不适用'],
        ];

        var html = '';
        for (var i = 0; i < fields.length; i++) {
          html += '<div class="detail-field"><label>' + fields[i][0] + '</label><div class="value">' + fields[i][1] + '</div></div>';
        }
        grid.innerHTML = html;

        // Build note
        var notes = [];
        if (item.note) notes.push(item.note);
        if (item.sp) notes.push('特殊规定：' + item.sp);

        // Add class desc
        for (var k = 0; k < classes.length; k++) {
          if (classes[k].id === getClassId(item.cls)) {
            notes.push('【' + classes[k].name + '】' + classes[k].desc);
            if (classes[k].pg_rules) {
              for (var r = 0; r < classes[k].pg_rules.length; r++) {
                var rule = classes[k].pg_rules[r];
                notes.push('包装类别' + rule.pg + '：' + (rule.flash || rule.tox || rule.desc));
              }
            }
            break;
          }
        }
        note.innerHTML = notes.map(function(n) { return '<p style="margin-bottom:4px">' + n + '</p>'; }).join('');

        renderTable();
        scrollToDetail();
      }

      function scrollToDetail() {
        var panel = document.getElementById('detailPanel');
        panel.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
      }

      function copyDetail() {
        if (!selectedItem) return;
        var text = [
          'UN编号：' + selectedItem.un,
          '品名：' + selectedItem.name,
          '类别：' + selectedItem.cls + ' ' + getClassName(selectedItem.cls),
          '副危险性：' + (selectedItem.sub || '无'),
          '包装类别：' + (selectedItem.pg || '不适用'),
          '特殊规定：' + (selectedItem.sp || '无'),
          '备注：' + (selectedItem.note || '无'),
        ].join('\n');
        navigator.clipboard.writeText(text).then(function() {
          alert('已复制到剪贴板');
        });
      }

      // Events
      document.getElementById('searchInput').addEventListener('input', function() {
        currentSearch = this.value.trim();
        renderTable();
      });

      document.getElementById('classChips').addEventListener('click', function(e) {
        if (e.target.classList.contains('class-chip')) {
          currentClass = e.target.getAttribute('data-cls') || null;
          currentSubclass = null;
          buildSubChips(currentClass);
          // Update active
          var chips = document.querySelectorAll('.class-chip');
          for (var i = 0; i < chips.length; i++) chips[i].classList.remove('active');
          e.target.classList.add('active');
          var subs = document.querySelectorAll('.sub-chip');
          for (var j = 0; j < subs.length; j++) subs[j].classList.remove('active');
          selectedItem = null;
          document.getElementById('detailEmpty').style.display = '';
          document.getElementById('detailContent').style.display = 'none';
          renderTable();
        }
      });

      document.getElementById('subChips').addEventListener('click', function(e) {
        if (e.target.classList.contains('sub-chip')) {
          currentSubclass = currentSubclass === e.target.getAttribute('data-sub') ? null : e.target.getAttribute('data-sub');
          var subs = document.querySelectorAll('.sub-chip');
          for (var i = 0; i < subs.length; i++) subs[i].classList.remove('active');
          if (currentSubclass) e.target.classList.add('active');
          selectedItem = null;
          document.getElementById('detailEmpty').style.display = '';
          document.getElementById('detailContent').style.display = 'none';
          renderTable();
        }
      });

      document.getElementById('tableBody').addEventListener('click', function(e) {
        var row = e.target.closest('tr');
        if (!row) return;
        var un = row.getAttribute('data-un');
        var item = items.find(function(it) { return it.un === un; });
        if (item) showDetail(item);
      });

      // Print timestamp
      document.getElementById('printTime').textContent =
        new Date().toISOString().replace('T',' ').slice(0,16);

      // Init
      buildClassChips();
      renderTable();
    })();
  </script>
</body>
</html>
